<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POINT TRACKER — Syringe Logo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#04080f;
  font-family:'Sora',sans-serif;
  padding:52px 16px 80px;
  display:flex;flex-direction:column;
  align-items:center;gap:52px;
}
.tag{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:.2em;text-transform:uppercase;text-align:center;
}
.row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;align-items:flex-start}

@keyframes markIn{from{opacity:0;transform:scaleY(0)}to{opacity:1;transform:scaleY(1)}}
.t{transform-box:fill-box;transform-origin:50% 50%;animation:markIn .15s ease both}
.t:nth-child(1){animation-delay:.10s}.t:nth-child(2){animation-delay:.18s}
.t:nth-child(3){animation-delay:.26s}.t:nth-child(4){animation-delay:.34s}
.t:nth-child(5){animation-delay:.42s}.t:nth-child(6){animation-delay:.56s}
.t:nth-child(7){animation-delay:.64s}.t:nth-child(8){animation-delay:.72s}
.t:nth-child(9){animation-delay:.80s}.t:nth-child(10){animation-delay:.88s}
.t:nth-child(11){animation-delay:1.0s}.t:nth-child(12){animation-delay:1.08s}
.t:nth-child(13){animation-delay:1.16s}

@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.wmlabel{animation:fadeUp .4s ease 1.25s both}
</style>
</head>
<body>

<div style="text-align:center">
  <p class="tag" style="color:#162840;margin-bottom:6px">Point Tracker · Logo</p>
</div>

<!--
  Syringe axis y=68. Barrel bottom y=89, flange bottom y=96.
  Needle tip: (305, 68).
  Drops fall from (305, 70) → surface at y=152 (~82px below tip, ~56px below syringe bottom).
  ViewBox: 0 0 320 162
-->
<div>

    <!-- Drop canvas overlay drawn by JS -->
    <g id="dropLayer"></g>

  </svg>
</div>

    <g stroke="#00d4c8" stroke-width=".55" opacity=".3"><line x1="94" y1="58" x2="104" y2="58"/><line x1="94" y1="60" x2="104" y2="60"/><line x1="94" y1="62.5" x2="104" y2="62.5"/></g>
    <line x1="104" y1="60" x2="114" y2="60" stroke="#00d4c8" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="111" y1="58.2" x2="114" y2="60" stroke="#00d4c8" stroke-width=".9" stroke-linecap="round" opacity=".7"/>
    <text x="60" y="104" text-anchor="middle" font-family="'Sora',sans-serif" font-size="10" font-weight="800" fill="#00d4c8" letter-spacing=".22em">PT</text>
  </svg>
</div>

<script>
// ── Drop animation engine ──────────────────────────────────────
// Needle tip: SVG coords (305, 68). Surface: y=152. Fall distance: 84px.
// Phases: FORM(0.8s) → FALL(1.4s) → SPLASH(0.5s) → PAUSE(0.5s) → repeat
// One drop at a time, sequential.

const NS = 'http://www.w3.org/2000/svg';
const layer = document.getElementById('dropLayer');
const TIP_X = 305, TIP_Y = 70;
const SURFACE_Y = 152;
const FALL_DIST = SURFACE_Y - TIP_Y - 17; // 17 = approx drop height
const COLOR = '#00d4c8';

const FORM_MS  = 700;
const FALL_MS  = 1200;
const SPLASH_MS = 500;
const PAUSE_MS = 400;
const CYCLE_MS = FORM_MS + FALL_MS + SPLASH_MS + PAUSE_MS;

// Ease-in curve for falling (gravity feel)
function easeIn(t) { return t * t; }

let startTime = null;

// SVG helpers
function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// Build persistent elements, show/hide/move each frame
const bead  = el('circle', { cx: TIP_X, cy: TIP_Y + 2, r: 0, fill: COLOR, opacity: 0 });
const drop  = el('path',   { d: dropPath(TIP_X, TIP_Y), fill: COLOR, opacity: 0 });
const ring  = el('ellipse',{ cx: TIP_X, cy: SURFACE_Y, rx: 0, ry: 0, fill: COLOR, opacity: 0 });
const dotL  = el('circle', { cx: TIP_X, cy: SURFACE_Y, r: 1.5, fill: COLOR, opacity: 0 });
const dotR  = el('circle', { cx: TIP_X, cy: SURFACE_Y, r: 1.5, fill: COLOR, opacity: 0 });
const surf  = el('line',   { x1: 258, y1: SURFACE_Y, x2: 320, y2: SURFACE_Y,
                              stroke: COLOR, 'stroke-width': .7, opacity: .15 });
[surf, bead, drop, ring, dotL, dotR].forEach(e => layer.appendChild(e));

function dropPath(x, y) {
  // Teardrop: pointed top at (x,y), height 17, half-width 6
  return `M ${x} ${y} C ${x-6} ${y+4} ${x-6} ${y+13} ${x} ${y+17} C ${x+6} ${y+13} ${x+6} ${y+4} ${x} ${y} Z`;
}

function set(e, attrs) {
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
}

function frame(ts) {
  if (!startTime) startTime = ts;
  const elapsed = (ts - startTime) % CYCLE_MS;

  if (elapsed < FORM_MS) {
    // ── FORMING: bead grows at tip ──
    const t = elapsed / FORM_MS;
    const r = t < 0.5 ? t * 2 * 4 : (1 - (t - 0.5) * 2) * 4; // grow then shrink back
    set(bead, { r: r.toFixed(2), cy: TIP_Y + 2 + t * 2, opacity: t < 0.1 ? 0 : 1 });
    set(drop, { opacity: 0 });
    set(ring, { rx: 0, ry: 0, opacity: 0 });
    set(dotL, { opacity: 0 }); set(dotR, { opacity: 0 });

  } else if (elapsed < FORM_MS + FALL_MS) {
    // ── FALLING: drop moves down ──
    const t = easeIn((elapsed - FORM_MS) / FALL_MS);
    const dy = t * FALL_DIST;
    set(bead, { r: 0, opacity: 0 });
    set(drop, { d: dropPath(TIP_X, TIP_Y + dy), opacity: 1 });
    set(ring, { rx: 0, ry: 0, opacity: 0 });
    set(dotL, { opacity: 0 }); set(dotR, { opacity: 0 });

  } else if (elapsed < FORM_MS + FALL_MS + SPLASH_MS) {
    // ── SPLASH: drop hits surface ──
    const t = (elapsed - FORM_MS - FALL_MS) / SPLASH_MS;
    set(bead, { r: 0, opacity: 0 });
    set(drop, { opacity: 0 });
    // Ring expands outward, fades
    const rx = t * 22;
    const ry = Math.max(0, 2.5 * (1 - t * 1.4));
    set(ring, { rx: rx.toFixed(1), ry: ry.toFixed(2), opacity: (1 - t).toFixed(2) });
    // Spray dots arc out
    const sd = t * 16;
    const sy = -t * 8;
    const sdOp = t > 0.7 ? 0 : (1 - t / 0.7).toFixed(2);
    set(dotL, { cx: TIP_X - sd, cy: SURFACE_Y + sy, opacity: sdOp });
    set(dotR, { cx: TIP_X + sd, cy: SURFACE_Y + sy, opacity: sdOp });

  } else {
    // ── PAUSE ──
    set(bead, { r: 0, opacity: 0 });
    set(drop, { opacity: 0 });
    set(ring, { rx: 0, ry: 0, opacity: 0 });
    set(dotL, { opacity: 0 }); set(dotR, { opacity: 0 });
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>

</body>
</html>
